services:
  - type: web
    name: matrimony-web
    env: python
    region: oregon
    branch: master
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn matrimonial_site.wsgi --log-file -
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "0.0.0.0,localhost"
      - key: DJANGO_SECRET_KEY
        generation: secret
    autoDeploy: true
    plan: free
