{% extends "base.html" %}

{% block content %}
<div class="card border-0 shadow-sm">
    <div class="card-body p-4">
        <h2 class="mb-4">Edit Profile</h2>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row g-3">
                {% for field in form %}
                    <div class="col-md-6">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}<div class="text-danger small">{{ field.errors|join:", " }}</div>{% endif %}
                    </div>
                {% endfor %}
            </div>

            <hr class="my-4">
            <h4 class="mb-3">Upload Photo</h4>
            <div class="row g-3">
                <div class="col-md-8">
                    <label class="form-label">Image</label>
                    {{ photo_form.image }}
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <div class="form-check">
                        {{ photo_form.is_primary }}
                        <label class="form-check-label">Set as primary photo</label>
                    </div>
                </div>
            </div>

            <button class="btn btn-primary mt-4">Save Changes</button>
        </form>
    </div>
</div>
{% endblock %}
