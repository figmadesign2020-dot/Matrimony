{% extends "base.html" %}

{% block content %}
<div class="card border-0 shadow-sm">
    <div class="card-body p-4">
        <h2 class="mb-4">Partner Preferences</h2>
        <form method="post">
            {% csrf_token %}
            <div class="row g-3">
                {% for field in form %}
                    <div class="col-md-6">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}<div class="text-danger small">{{ field.errors|join:", " }}</div>{% endif %}
                    </div>
                {% endfor %}
            </div>
            <button class="btn btn-primary mt-4">Save Preferences</button>
        </form>
    </div>
</div>
{% endblock %}
